name: Sync Trello to Dust

on:
  workflow_dispatch:
  schedule:
    # Runs every 1 hour. GitHub schedules use UTC.
    - cron: "0 */1 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Sync Trello board to Dust
        env:
          TRELLO_API_KEY: ${{ secrets.TRELLO_API_KEY }}
          TRELLO_API_TOKEN: ${{ secrets.TRELLO_API_TOKEN }}
          TRELLO_BOARD_ID: ${{ secrets.TRELLO_BOARD_ID }}
          DUST_API_BASE: ${{ secrets.DUST_API_BASE }}
          DUST_API_KEY: ${{ secrets.DUST_API_KEY }}
          DUST_WORKSPACE_ID: ${{ secrets.DUST_WORKSPACE_ID }}
          DUST_SPACE_ID: ${{ secrets.DUST_SPACE_ID }}
          DUST_DATA_SOURCE_ID: ${{ secrets.DUST_DATA_SOURCE_ID }}
          DUST_DOCUMENT_ID: ${{ secrets.DUST_DOCUMENT_ID }}
        run: python trello_dust_sync.py sync
